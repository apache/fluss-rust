name: 'Cache Docker images for Fluss tests'
description: 'Reads image versions from test-images.env, caches via docker save/load.'

runs:
  using: 'composite'
  steps:
    - name: Read image versions
      id: v
      shell: bash
      run: |
        source crates/fluss-test-cluster/test-images.env
        echo "fluss=${FLUSS_IMAGE}:${FLUSS_VERSION}" >> "$GITHUB_OUTPUT"
        echo "zk=${ZOOKEEPER_IMAGE}:${ZOOKEEPER_VERSION}" >> "$GITHUB_OUTPUT"

    - uses: actions/cache@v4
      with:
        path: /tmp/docker-images
        key: docker-${{ runner.os }}-${{ steps.v.outputs.fluss }}-${{ steps.v.outputs.zk }}

    - name: Load or pull Docker images
      shell: bash
      run: |
        if [ -f /tmp/docker-images/fluss.tar ]; then
          docker load -i /tmp/docker-images/fluss.tar
          docker load -i /tmp/docker-images/zookeeper.tar
        else
          docker pull "${{ steps.v.outputs.fluss }}"
          docker pull "${{ steps.v.outputs.zk }}"
          mkdir -p /tmp/docker-images
          docker save "${{ steps.v.outputs.fluss }}" -o /tmp/docker-images/fluss.tar
          docker save "${{ steps.v.outputs.zk }}" -o /tmp/docker-images/zookeeper.tar
        fi
