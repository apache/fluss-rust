name: Elixir Build and Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'website/**'
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'website/**'
      - '**/*.md'
      - 'bindings/cpp/**'
      - 'bindings/python/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build-and-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      FLUSS_TEST_CLUSTER_BIN: ${{ github.workspace }}/target/debug/fluss-test-cluster
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v6

      # Workaround: erlef/setup-beam is not on the ASF action allowlist.
      # Install OTP via Erlang Solutions' apt repo and Elixir from the
      # official precompiled release zip. Revisit once ASF INFRA allowlists
      # erlef/setup-beam (https://github.com/apache/fluss-rust/issues/459).
      - name: Install Erlang/OTP
        run: |
          curl -fsSL https://packages.erlang-solutions.com/ubuntu/erlang_solutions.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/erlang-solutions.gpg
          echo "deb [signed-by=/usr/share/keyrings/erlang-solutions.gpg] https://packages.erlang-solutions.com/ubuntu $(lsb_release -cs) contrib" \
            | sudo tee /etc/apt/sources.list.d/erlang-solutions.list
          sudo apt-get update
          sudo apt-get install -y esl-erlang

      - name: Install Elixir
        run: |
          VERSION=1.19.5
          curl -fsSL -o /tmp/elixir.zip \
            "https://github.com/elixir-lang/elixir/releases/download/v${VERSION}/elixir-otp-28.zip"
          sudo mkdir -p /usr/local/elixir
          sudo unzip -qo /tmp/elixir.zip -d /usr/local/elixir
          echo "/usr/local/elixir/bin" >> "$GITHUB_PATH"
          /usr/local/elixir/bin/elixir --version

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Cache Mix deps and build
        uses: actions/cache@v4
        with:
          path: |
            bindings/elixir/deps
            bindings/elixir/_build
          key: ${{ runner.os }}-mix-otp28-elixir1.19-${{ hashFiles('bindings/elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-otp28-elixir1.19-

      - name: Build fluss-test-cluster binary
        run: cargo build -p fluss-test-cluster

      - name: Fetch Elixir deps
        working-directory: bindings/elixir
        run: mix deps.get

      - name: Check formatting
        working-directory: bindings/elixir
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        working-directory: bindings/elixir
        run: mix compile --warnings-as-errors

      - name: Credo
        working-directory: bindings/elixir
        run: mix credo

      - name: Run unit tests
        working-directory: bindings/elixir
        run: mix test

      - name: Run integration tests
        working-directory: bindings/elixir
        run: mix test --include integration --only integration
        env:
          RUST_LOG: DEBUG
          RUST_BACKTRACE: full
